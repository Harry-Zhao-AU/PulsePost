name: Handle Approval

on:
  issue_comment:
    types: [created]

jobs:
  handle:
    runs-on: ubuntu-latest
    # Only run on issues (not PRs) with pending-approval label
    if: >
      github.event.issue.pull_request == null &&
      contains(github.event.issue.labels.*.name, 'pending-approval')

    permissions:
      issues: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Handle approval comment
        run: echo '${{ toJson(github.event) }}' | python scripts/handle_approval.py
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
