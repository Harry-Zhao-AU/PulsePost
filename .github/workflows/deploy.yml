name: Deploy to Azure

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-functions:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet publish src/PulsePost.Functions/PulsePost.Functions.csproj -c Release -o publish/

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: pulsepost-func
          package: publish/
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}

      - name: Register Telegram Webhook
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
            -d "url=https://pulsepost-func.azurewebsites.net/api/TelegramWebhook"
